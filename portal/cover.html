<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@700;800&family=Fredoka:wght@500;600;700&display=swap" rel="stylesheet" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1920px; height: 1080px; overflow: hidden; }
  body {
    font-family: 'Fredoka', system-ui, sans-serif;
    background: linear-gradient(150deg, #8ad7ff 0%, #c6b8ff 55%, #ffd6f0 100%);
    position: relative;
  }
  /* soft glow blobs */
  .blob { position: absolute; border-radius: 50%; filter: blur(10px); opacity: .5; }
  .b1 { width: 520px; height: 520px; background: #ffffff66; top: -160px; left: -120px; }
  .b2 { width: 640px; height: 640px; background: #ffd6f088; bottom: -260px; right: -160px; }
  .b3 { width: 360px; height: 360px; background: #6ee7ff77; bottom: 80px; left: 120px; }

  /* scattered decorative emoji */
  .deco { position: absolute; opacity: .9; filter: drop-shadow(0 8px 0 rgba(43,33,80,.10)); }

  .stage { position: absolute; inset: 0; display: flex; flex-direction: column;
           align-items: center; justify-content: center; gap: 40px; }

  .badge {
    width: 300px; height: 300px; border-radius: 68px;
    background: linear-gradient(160deg, #ffffff, #fff7e8);
    border: 12px solid #ffffff;
    box-shadow: 0 30px 0 rgba(43,33,80,.14), 0 40px 80px rgba(43,33,80,.25);
    display: grid; place-items: center;
    transform: rotate(-5deg);
  }
  .badge span { font-size: 200px; line-height: 1; filter: drop-shadow(0 10px 0 rgba(0,0,0,.10)); }

  .title {
    font-family: 'Baloo 2', sans-serif; font-weight: 800;
    font-size: 190px; line-height: .92; color: #fff; text-align: center;
    letter-spacing: 2px;
    text-shadow: 0 8px 0 #7c5cff, 0 16px 0 #5a3fd1, 0 30px 40px rgba(43,33,80,.35);
  }
  .tagpill {
    display: inline-flex; align-items: center; gap: 20px;
    background: #2b2150; color: #fff; font-family: 'Baloo 2', sans-serif; font-weight: 800;
    font-size: 62px; padding: 26px 60px; border-radius: 999px;
    box-shadow: 0 16px 0 rgba(43,33,80,.35);
  }
  .tagpill .coin { color: #ffd43b; }
</style>
</head>
<body>
  <div class="blob b1"></div>
  <div class="blob b2"></div>
  <div class="blob b3"></div>

  <!-- decorative game emojis -->
  <div class="deco" style="top:90px;  left:210px;  font-size:150px; transform:rotate(-12deg)">🧩</div>
  <div class="deco" style="top:300px; left:70px;   font-size:110px; transform:rotate(10deg)">🔢</div>
  <div class="deco" style="bottom:150px;left:250px; font-size:130px; transform:rotate(8deg)">🎵</div>
  <div class="deco" style="top:140px;  right:230px; font-size:150px; transform:rotate(12deg)">🎯</div>
  <div class="deco" style="top:380px;  right:90px;  font-size:120px; transform:rotate(-9deg)">🃏</div>
  <div class="deco" style="bottom:130px;right:250px; font-size:135px; transform:rotate(-11deg)">⚡</div>
  <div class="deco" style="bottom:400px;right:120px; font-size:90px;  transform:rotate(14deg)">🪙</div>
  <div class="deco" style="bottom:420px;left:120px;  font-size:90px;  transform:rotate(-14deg)">⭐</div>

  <div class="stage">
    <div class="badge"><span>🧠</span></div>
    <div class="title">Brainy&nbsp;Bunch</div>
    <div class="tagpill"><span class="coin">🪙</span> 23 Free Brain Games</div>
  </div>
</body>
</html>
